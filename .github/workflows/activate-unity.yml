name: Acquire Unity activation file

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request activation file
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate activation file
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            unityci/editor:ubuntu-2022.3.22f1-base-3@sha256:003109364b9db1cdb4200f9abfd31ec92c1de61abfff491c68bdaca2e0796885 \
            /opt/unity/Editor/Unity -batchmode -nographics -createManualActivationFile -logFile /dev/null -quit || true

      - name: Upload activation file
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Unity_v2022.3.22f1.alf
          path: "*.alf"
          if-no-files-found: error
