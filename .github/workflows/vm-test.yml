name: VM Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  vm-test:
    name: Udon VM Tests
    permissions:
      contents: read
      actions: write
    timeout-minutes: 30
    concurrency:
      group: vm-test-${{ github.ref }}
      cancel-in-progress: true
    if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10.15.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install vrc-get
        run: |
          curl -fL -o /usr/local/bin/vrc-get \
            "https://github.com/vrc-get/vrc-get/releases/download/v1.9.1/x86_64-unknown-linux-musl-vrc-get"
          echo "a34aecf8ccf304dfc62d8073e7a6fc166472ec6f7bf40f22f7c44745ac0394a1  /usr/local/bin/vrc-get" | sha256sum -c -
          chmod +x /usr/local/bin/vrc-get

      - name: Setup VRChat SDK
        run: vrc-get resolve --project tests/vm/unity-project

      - name: Run VM Tests
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            -e UNITY_LICENSE \
            -e UNITY_EDITOR_PATH=/opt/unity/Editor/Unity \
            unityci/editor:ubuntu-2022.3.22f1-base-3@sha256:003109364b9db1cdb4200f9abfd31ec92c1de61abfff491c68bdaca2e0796885 \
            bash -c '
              # Place license file directly in Unity cache directory
              # (bypasses machine binding validation that -manualLicenseFile performs)
              mkdir -p /root/.local/share/unity3d/Unity/
              echo "$UNITY_LICENSE" | tr -d "\r" > /root/.local/share/unity3d/Unity/Unity_lic.ulf

              # Install Node.js for running vitest
              curl -fsSL https://deb.nodesource.com/setup_24.x | bash - >/dev/null 2>&1
              apt-get install -y -qq nodejs >/dev/null 2>&1

              # Run tests
              ./node_modules/.bin/vitest run tests/vm/ --hideSkippedTests
            '
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vm-test-results
          path: tests/vm/unity-project/TestResults/
          if-no-files-found: warn
