name: VM Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  vm-test:
    name: Udon VM Tests
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-2022.3.22f1-base-3
    steps:
      - name: Activate Unity License
        uses: game-ci/unity-activate@33cd3ea96f11f3a1ddcf8fa9d8d265d5ea81e240 # v2
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10.15.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install vrc-get
        run: |
          curl -L -o /usr/local/bin/vrc-get \
            "https://github.com/vrc-get/vrc-get/releases/download/v1.9.1/x86_64-unknown-linux-musl-vrc-get"
          echo "a34aecf8ccf304dfc62d8073e7a6fc166472ec6f7bf40f22f7c44745ac0394a1  /usr/local/bin/vrc-get" | sha256sum -c -
          chmod +x /usr/local/bin/vrc-get

      - name: Setup VRChat SDK
        run: vrc-get resolve --project tests/vm/unity-project

      - name: Run VM Tests
        env:
          UNITY_EDITOR_PATH: /opt/unity/Editor/Unity
        run: pnpm test:vm

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vm-test-results
          path: tests/vm/unity-project/TestResults/
          if-no-files-found: ignore
